<div class="space-y-6">
  <header>
    <h1 class="text-2xl font-semibold text-zinc-50">Reminder settings</h1>
    <p class="mt-1 text-sm text-zinc-400">Choose when ProofPocket should email you before deadlines.</p>
  </header>

  <form method="post" class="rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6">
    {% csrf_token %}

    <div class="text-sm font-medium text-zinc-100">Email me</div>
    <div class="mt-1 text-sm text-zinc-500">We’ll send reminders at 09:00 local time.</div>

    <div class="mt-4 space-y-3">
      {% for r in rules %}
        <label class="flex items-start justify-between gap-4 rounded-xl border border-zinc-800 bg-zinc-950 p-4">
          <div>
            <div class="text-sm font-medium text-zinc-100">{{ r.get_kind_display }}</div>
            <div class="mt-1 text-xs text-zinc-500">{{ r.days_before }} day{{ r.days_before|pluralize }} before</div>
          </div>
          <input
            class="mt-1 h-4 w-4 rounded border-zinc-700 bg-zinc-950"
            type="checkbox"
            name="enabled_rule"
            value="{{ r.id }}"
            {% if r.enabled %}checked{% endif %}
          />
        </label>
      {% endfor %}
    </div>

    <div class="mt-5 flex justify-end">
      <button class="inline-flex items-center rounded-xl bg-zinc-50 px-4 py-2 text-sm font-medium text-zinc-900 hover:bg-white" type="submit">
        Save
      </button>
    </div>
  </form>
</div>
