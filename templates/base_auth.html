{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ProofPocket{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
  </head>
  <body class="min-h-dvh bg-zinc-950 text-zinc-50">
    <div class="mx-auto flex min-h-dvh max-w-md items-center px-4 py-10">
      <div class="w-full rounded-2xl border border-zinc-800 bg-zinc-900/40 p-6">
        <div class="text-sm font-semibold tracking-wide text-zinc-100">ProofPocket</div>
        <div class="mt-1 text-xs text-zinc-400">Receipts, warranties, reminders</div>
        <div class="mt-6">
          {% block content %}{% endblock %}
        </div>
      </div>
    </div>
  </body>
</html>
